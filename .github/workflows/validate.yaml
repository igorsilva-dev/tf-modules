name: Terraform Validation

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  validate:
    name: Validate Modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - civo/kubernetes
          - civo/network
          - helm
          - kubernetes/namespaces-rbac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform -chdir=${{ matrix.module }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.module }} validate

  tflint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.53.0"

      - name: Init TFLint
        run: tflint --init --config .tflint.hcl

      - name: Run TFLint (civo/kubernetes)
        run: tflint --config $(pwd)/.tflint.hcl --chdir civo/kubernetes

      - name: Run TFLint (civo/network)
        run: tflint --config $(pwd)/.tflint.hcl --chdir civo/network

      - name: Run TFLint (helm)
        run: tflint --config $(pwd)/.tflint.hcl --chdir helm

      - name: Run TFLint (kubernetes/namespaces-rbac)
        run: tflint --config $(pwd)/.tflint.hcl --chdir kubernetes/namespaces-rbac

  tfsec:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: --minimum-severity MEDIUM
